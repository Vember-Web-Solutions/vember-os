services:
  vember-os:
    build: .
    container_name: vember_hub
    stdin_open: true 
    tty: true
    network_mode: "host"
    volumes:
      # Map the local root to the container root
      # This allows you to edit main.py locally and see changes in the container
      - .:/app 
      # Specific Scopes
      - ./ops:/app/ops
      - ./data:/app/data