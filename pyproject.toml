[project]
name = "vember-os"
version = "0.1.1a0"
description = "Ncurses-based Terminal OS"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "rich",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[project.scripts]
sync-ver = "scripts.sync_version:sync"