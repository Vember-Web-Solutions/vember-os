[project]
name = "vember-os"
version = "0.1.1a6" # 🔱 Incrementing for the new Snapshot
description = "Secure, Docker-orchestrated Node Automation Ecosystem"
requires-python = ">=3.13"
dependencies = [
    "psutil>=7.2.2",
    "requests>=2.33.1",
    "rich",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[project.scripts]
sync-ver = "scripts.sync_version:sync"
