[project]
name = "vember-os"
version = "0.1.0"
description = "A node-based terminal operating system for managing containerized resource groups."
readme = "README.md"
authors = [
    { name = "Vember-Web-Solutions" }
]
requires-python = ">=3.13"
dependencies = [
    "cryptography>=46.0.5",
    "docker>=7.1.0",
    "python-dotenv>=1.2.2",
    "textual>=1.0.0",
    "rich>=13.9.4",
]

[project.scripts]
vember = "vember_core.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
[tool.hatch.build.targets.wheel]
packages = ["src/vember_core"]