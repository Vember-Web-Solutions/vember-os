name: 🔱 Vember-OS Version Sync

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'pyproject.toml'

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔄 Run Sync Script
        run: python scripts/sync_version.py

      - name: 💾 Commit and PR via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Setup Identity
          git config --global user.name "Vember-Sync"
          git config --global user.email "bot@vember-os.local"
          
          # 2. Check for changes
          if git diff --quiet README.md; then
            echo "No changes detected in README. Sync unnecessary."
            exit 0
          fi

          # 3. Create a unique branch for the PR
          BRANCH_NAME="sync/version-$(date +%s)"
          git checkout -b $BRANCH_NAME
          
          # 4. Push changes
          git add README.md
          git commit -m "docs: sync version badge to $(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          git push origin $BRANCH_NAME

          # 5. Create the PR using Native GitHub CLI
          gh pr create \
            --title "🔱 Vember-Sync: Update README Badge" \
            --body "Automated version sync triggered by pyproject.toml update." \
            --base ${{ github.ref_name }} \
            --head $BRANCH_NAME \
            --label "automated"