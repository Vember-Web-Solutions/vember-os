name: 🔱 Vember-OS Version Sync

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'pyproject.toml'

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Required to create/approve PRs

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔄 Run Sync Script
        run: python scripts/sync_version.py

      - name: 💾 Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: sync version badge to $(python -c 'import tomllib; print(tomllib.load(open(\"pyproject.toml\", \"rb\"))[\"projectext\"][\"version\"])')"
          committer: Vember-Sync <bot@vember-os.local>
          author: Vember-Sync <bot@vember-os.local>
          branch: auto-version-sync
          title: "🔱 Vember-Sync: Update README Badge"
          body: |
            Automated version sync triggered by changes in `pyproject.toml`.
            - Updated README.md version badge.
          labels: |
            documentation
            automated
          delete-branch: true