name: 🔱 Vember-OS Version Sync

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'pyproject.toml'

# 🔱 Force the runner to use Node 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔄 Run Sync Script
        run: python scripts/sync_version.py

      - name: 💾 Commit and PR via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Vember-Sync"
          git config --global user.email "bot@vember-os.local"
          
          if git diff --quiet README.md; then
            echo "No changes detected. README is already synced."
            exit 0
          fi

          # Create unique branch
          BRANCH_NAME="sync/version-$(date +%s)"
          git checkout -b $BRANCH_NAME
          
          git add README.md
          git commit -m "docs: sync version badge to $(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          git push origin $BRANCH_NAME

          # Create PR and set to auto-merge if your rules allow, 
          # otherwise it stays open for your review.
          gh pr create \
            --title "🔱 Vember-Sync: Update README Badge" \
            --body "Automated version sync triggered by pyproject.toml update. Node.js 24 Engine Enforced." \
            --base ${{ github.ref_name }} \
            --head $BRANCH_NAME \