name: 🔱 Vember-OS Version Sync

on:
  push:
    branches:
      - main
      - dev  # 🔱 Temporary for testing
    paths:
      - 'pyproject.toml' # Only run if the version actually changed

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing the README update back

    steps:
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 🔄 Run Sync Script
        run: python scripts/sync_version.py

      - name: 💾 Commit Changes
        run: |
          git config --global user.name "Vember-Bot"
          git config --global user.email "bot@vember-os.local"
          git add README.md
          # Only commit if there are changes to avoid infinite loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: sync version badge to $(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')" && git push)